<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Calendar PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,sans-serif;
background:#0f0f0f;
margin:0;
color:#fff
zoom:0.85;
}

#app{
max-width:400px;
margin:auto;
padding:18px
}

h2{
text-align:left;
margin-bottom:10px;
font-weight:600;
letter-spacing:-0.5px;
padding-left:4px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:11px
}

.day-wrap{
display:flex;
justify-content:center
}

.day{
width:46px;
height:46px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12.5px;
color:#aaa;
position:relative;
background:#1a1a1a;
transition:all 0.2s ease;
}

.day:hover{
transform:scale(1.05)
}

.active{
background:#fc4c02;
color:#fff;
box-shadow:0 0 8px rgba(252,76,2,0.6)
}

.today{
border:2px solid #fc4c02
}

.day.active.today{
background:#fc4c02;
border:2px solid #fff
}

.icons{
position:absolute;
bottom:-5px;
display:flex;
gap:2px;
font-size:11px
}

.login{
display:flex;
flex-direction:column;
gap:10px
}

input,button{
padding:11px;
border-radius:10px;
border:none;
font-size:13px
}

input{
background:#1a1a1a;
color:#fff
}

button{
background:#fc4c02;
color:#fff;
font-weight:600;
}
</style>
</head>

<body>

<div id="app">

<div id="auth" class="login">
<h2>Login Strava</h2>
<input id="cid" placeholder="Client ID">
<input id="cs" placeholder="Client Secret">
<button onclick="login()">Connetti</button>
</div>

<div id="calendarUI" style="display:none">
<h2 id="monthLabel"></h2>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>
const REDIRECT = location.origin + location.pathname

function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)}

function login(){
const cid=document.getElementById('cid').value
const cs=document.getElementById('cs').value
save('cid',cid)
save('cs',cs)

const url=`https://www.strava.com/oauth/authorize?client_id=${cid}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code&scope=activity:read_all`
location.href=url
}

async function exchange(code){
const res=await fetch('https://www.strava.com/oauth/token',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
client_id:get('cid'),
client_secret:get('cs'),
code,
grant_type:'authorization_code'
})})

const d=await res.json()
save('token',d.access_token)
save('refresh',d.refresh_token)
save('expires',d.expires_at)
}

async function refresh(){
const res=await fetch('https://www.strava.com/oauth/token',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
client_id:get('cid'),
client_secret:get('cs'),
grant_type:'refresh_token',
refresh_token:get('refresh')
})})

const d=await res.json()
save('token',d.access_token)
save('refresh',d.refresh_token)
save('expires',d.expires_at)
}

async function getActivities(){
let exp=get('expires')

if(!exp || Date.now()/1000 > exp){
await refresh()
}

const token=get('token')

const res=await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=100',{
headers:{Authorization:`Bearer ${token}`}
})

if(res.status===401){
localStorage.clear()
location.reload()
return []
}

return await res.json()
}

function icon(t){
t = t.toLowerCase()

if(t.includes('run')) return '🏃'
if(t.includes('ride')) return '🚴'
if(t.includes('swim')) return '🏊'
if(t.includes('weight') || t.includes('workout') || t.includes('gym')) return '🏋️'

return '💪'
}

function render(acts){
const cal=document.getElementById('calendar')
cal.innerHTML=''

const now=new Date()
const y=now.getFullYear()
const m=now.getMonth()

monthLabel.innerText=now.toLocaleString('it',{month:'long',year:'numeric'})

const first=new Date(y,m,1)
let start=first.getDay()
start=start===0?7:start

const days=new Date(y,m+1,0).getDate()

const map={}
acts.forEach(a=>{
const d=new Date(a.start_date_local)
if(d.getMonth()===m && d.getFullYear()===y){
if(!map[d.getDate()]) map[d.getDate()]=[]
map[d.getDate()].push(a.type)
}
})

for(let i=1;i<start;i++) cal.appendChild(document.createElement('div'))

for(let i=1;i<=days;i++){
const wrap=document.createElement('div')
wrap.className='day-wrap'

const el=document.createElement('div')
el.className='day'
el.innerText=i

if(map[i]){
el.classList.add('active')

const icons=document.createElement('div')
icons.className='icons'

map[i].slice(0,3).forEach(t=>{
const span=document.createElement('span')
span.innerText=icon(t)
icons.appendChild(span)
})

el.appendChild(icons)
}

if(i===now.getDate()) el.classList.add('today')

wrap.appendChild(el)
cal.appendChild(wrap)
}
}

async function start(){
auth.style.display='none'
calendarUI.style.display='block'

const acts=await getActivities()
render(acts)
}

window.onload=async()=>{
const p=new URLSearchParams(location.search)

if(p.get('code')){
await exchange(p.get('code'))
history.replaceState({},'',REDIRECT)
start()
return
}

if(get('token')) start()
}
</script>

</body>
</html>
