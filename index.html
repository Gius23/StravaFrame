<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strava Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    #app { padding: 20px; max-width: 420px; margin: auto; }

    h2 { text-align: center; font-weight: 600; }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 10px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .day {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #444;
      margin: auto;
    }

    .inactive { color: #bbb; }

    .active {
      background: #000;
      color: white;
      font-weight: 600;
    }

    .today {
      border: 2px solid #fc4c02;
    }

    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fc4c02;
      border-radius: 50%;
      bottom: 4px;
    }

    .day-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>

<div id="app">
  <h2 id="monthLabel"></h2>
  <div class="weekdays">
    <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<script>
function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)}

async function loadActivities(){
  const token = get('token');

  const res = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=100',{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();
  if(!Array.isArray(data)) return [];
  return data;
}

function renderCalendar(acts){
  const cal = document.getElementById('calendar');
  cal.innerHTML='';

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById('monthLabel').innerText = now.toLocaleString('it',{month:'long',year:'numeric'});

  const firstDay = new Date(year, month, 1);
  let startDay = firstDay.getDay();

  // convert Sunday(0) -> 7
  startDay = startDay === 0 ? 7 : startDay;

  const daysInMonth = new Date(year, month+1, 0).getDate();

  const map = {};
  acts.forEach(a=>{
    const d = new Date(a.start_date_local);
    if(d.getMonth()===month && d.getFullYear()===year){
      map[d.getDate()] = true;
    }
  });

  // padding before first Monday
  for(let i=1;i<startDay;i++){
    const empty = document.createElement('div');
    cal.appendChild(empty);
  }

  for(let i=1;i<=daysInMonth;i++){
    const wrap = document.createElement('div');
    wrap.className = 'day-wrap';

    const el = document.createElement('div');
    el.className='day';
    el.innerText=i;

    if(map[i]){
      el.classList.add('active');
    }

    if(i===now.getDate()){
      el.classList.add('today');
    }

    wrap.appendChild(el);

    if(map[i]){
      const dot = document.createElement('div');
      dot.className='dot';
      wrap.appendChild(dot);
    }

    cal.appendChild(wrap);
  }
}

async function start(){
  const acts = await loadActivities();
  renderCalendar(acts);
}

window.onload = start;
</script>

</body>
</html>
