<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strava Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #fc4c02;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    #app { display: none; padding: 20px; max-width: 600px; margin: auto; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      aspect-ratio: 1;
      background: #eee;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
    }

    .active { background: #ffe6dc; }
    .today { background: #fc4c02; color: white; }
  </style>
</head>

<body>

<div id="auth" class="center">
  <div class="card">
    <h2>Strava Login</h2>
    <input id="cid" placeholder="Client ID">
    <input id="cs" type="password" placeholder="Client Secret">
    <button onclick="goAuth()">Connetti</button>
  </div>
</div>

<div id="app">
  <h2 id="monthLabel"></h2>
  <div class="calendar" id="calendar"></div>
</div>

<script>
const REDIRECT = location.origin + location.pathname;
const SCOPE = 'read,activity:read_all';

function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)}
function clearAll(){localStorage.clear()}

function goAuth(){
  const cid = document.getElementById('cid').value;
  const cs = document.getElementById('cs').value;

  save('cid', cid);
  save('cs', cs);

  const url = `https://www.strava.com/oauth/authorize?client_id=${cid}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code&scope=${SCOPE}`;
  location.href = url;
}

async function exchange(code){
  const res = await fetch('https://www.strava.com/oauth/token',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      client_id:get('cid'),
      client_secret:get('cs'),
      code:code,
      grant_type:'authorization_code'
    })
  });

  const data = await res.json();
  save('token', data.access_token);
}

async function loadActivities(){
  const token = get('token');

  const res = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=100',{
    headers:{Authorization:`Bearer ${token}`}
  });

  return await res.json();
}

function renderCalendar(acts){
  const cal = document.getElementById('calendar');
  cal.innerHTML='';

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById('monthLabel').innerText = now.toLocaleString('it',{month:'long',year:'numeric'});

  const days = new Date(year, month+1, 0).getDate();

  const map = {};
  acts.forEach(a=>{
    const d = new Date(a.start_date_local);
    if(d.getMonth()===month && d.getFullYear()===year){
      map[d.getDate()] = true;
    }
  });

  for(let i=1;i<=days;i++){
    const el = document.createElement('div');
    el.className='day';
    el.innerText=i;

    if(map[i]) el.classList.add('active');
    if(i===now.getDate()) el.classList.add('today');

    cal.appendChild(el);
  }
}

async function start(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';

  const acts = await loadActivities();
  renderCalendar(acts);
}

window.onload = async ()=>{
  const params = new URLSearchParams(location.search);

  if(params.get('code')){
    await exchange(params.get('code'));
    history.replaceState({},'',REDIRECT);
    start();
    return;
  }

  if(get('token')){
    start();
  }
}
</script>

</body>
</html>
