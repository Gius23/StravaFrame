<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0f0f0f;
font-family:Inter,sans-serif;
color:#fff;
overflow:hidden;
}

#app{
max-width:320px;
margin:auto;
padding:10px;
}

h2{
font-size:13px;
margin:0 0 8px 2px;
font-weight:500;
color:#aaa;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
background:#1a1a1a;
color:#fff;
position:relative;
}

.active{
background:#fc4c02;
color:#fff;
}

.today{
border:2px solid #fff;
}

.emoji{
position:absolute;
font-size:12px;
bottom:2px;
right:3px;
}

.login{
display:flex;
flex-direction:column;
gap:6px;
}

input,button{
padding:8px;
border-radius:8px;
border:none;
font-size:12px;
}

input{
background:#1a1a1a;
color:#fff;
}

button{
background:#fc4c02;
color:#fff;
}
</style>
</head>

<body>

<div id="app">

<div id="auth" class="login">
<h2>Login</h2>
<input id="cid" placeholder="Client ID">
<input id="cs" placeholder="Secret">
<button onclick="login()">Connetti</button>
</div>

<div id="calendarUI" style="display:none">
<h2 id="monthLabel"></h2>
<div class="calendar" id="calendar"></div>
</div>

</div>

<script>
const REDIRECT = location.origin + location.pathname

function save(k,v){localStorage.setItem(k,v)}
function get(k){return localStorage.getItem(k)}

function login(){
const cid=document.getElementById('cid').value
const cs=document.getElementById('cs').value
save('cid',cid)
save('cs',cs)

location.href=`https://www.strava.com/oauth/authorize?client_id=${cid}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code&scope=activity:read_all`
}

async function exchange(code){
const res=await fetch('https://www.strava.com/oauth/token',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
client_id:get('cid'),
client_secret:get('cs'),
code,
grant_type:'authorization_code'
})})

const d=await res.json()
save('token',d.access_token)
save('refresh',d.refresh_token)
save('expires',d.expires_at)
}

async function refresh(){
const res=await fetch('https://www.strava.com/oauth/token',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
client_id:get('cid'),
client_secret:get('cs'),
grant_type:'refresh_token',
refresh_token:get('refresh')
})})

const d=await res.json()
save('token',d.access_token)
save('refresh',d.refresh_token)
save('expires',d.expires_at)
}

async function getActivities(){
let exp=get('expires')

if(!exp || Date.now()/1000 > exp){
await refresh()
}

const token=get('token')

const res=await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=100',{
headers:{Authorization:`Bearer ${token}`}
})

if(res.status===401){
localStorage.clear()
location.reload()
return []
}

return await res.json()
}

function icon(t){
t=t.toLowerCase()
if(t.includes('run')) return '🏃'
if(t.includes('ride')) return '🚴'
if(t.includes('weight')||t.includes('workout')) return '🏋️'
return '💪'
}

function render(acts){
const cal=document.getElementById('calendar')
cal.innerHTML=''

const now=new Date()
const y=now.getFullYear()
const m=now.getMonth()

monthLabel.innerText=now.toLocaleString('it',{month:'short'})

const first=new Date(y,m,1)
let start=first.getDay()
start=start===0?7:start

const days=new Date(y,m+1,0).getDate()

const map={}
acts.forEach(a=>{
const d=new Date(a.start_date_local)
if(d.getMonth()===m && d.getFullYear()===y){
if(!map[d.getDate()]) map[d.getDate()]=[]
map[d.getDate()].push(a.type)
}
})

for(let i=1;i<start;i++) cal.appendChild(document.createElement('div'))

for(let i=1;i<=days;i++){
const el=document.createElement('div')
el.className='day'
el.innerText=i

if(map[i]){
el.classList.add('active')

const e=document.createElement('div')
e.className='emoji'
e.innerText=icon(map[i][0])
el.appendChild(e)
}

if(i===now.getDate()) el.classList.add('today')

cal.appendChild(el)
}
}

async function start(){
auth.style.display='none'
calendarUI.style.display='block'
const acts=await getActivities()
render(acts)
}

window.onload=async()=>{
const p=new URLSearchParams(location.search)

if(p.get('code')){
await exchange(p.get('code'))
history.replaceState({},'',REDIRECT)
start()
return
}

if(get('token')) start()
}
</script>

</body>
</html>
