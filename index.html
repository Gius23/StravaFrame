<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #fc4c02;
    --orange-light: #fff0eb;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #999;
    --text-dim: #ccc;
    --border: #e8e8e8;
    --empty: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* AUTH */
  #auth-screen {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.1);
  }
  .logo { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: var(--text); text-transform: uppercase; }
  .logo em { color: var(--orange); font-style: normal; }
  .auth-note { color: var(--text-muted); font-size: 12px; text-align: center; line-height: 1.6; max-width: 260px; }
  .token-row { display: flex; gap: 8px; width: 100%; }
  .token-row input {
    flex: 1; background: #f8f8f8; border: 1.5px solid var(--border);
    color: var(--text); padding: 11px 14px; border-radius: 10px;
    font-size: 13px; font-family: inherit; outline: none;
  }
  .token-row input:focus { border-color: var(--orange); }
  .btn-go {
    background: var(--orange); color: white; border: none;
    padding: 11px 18px; border-radius: 10px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    transition: opacity .15s;
  }
  .btn-go:hover { opacity: .85; }
  .err { color: var(--orange); font-size: 12px; display: none; }

  /* APP */
  #app-screen { display: none; width: 100%; max-width: 400px; }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 22px 18px 18px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }

  /* Card header */
  .c-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 14px;
  }
  .month-row { display: flex; align-items: center; gap: 6px; }
  .month-label { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 20px; padding: 2px 5px;
    border-radius: 6px; line-height: 1; transition: background .15s;
  }
  .nav-btn:hover { background: var(--empty); }
  .strava-chevron { width: 34px; height: 34px; }

  /* Stats */
  .stats-row { display: flex; gap: 24px; margin-bottom: 18px; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .stat-val { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .stat-unit { font-size: 12px; font-weight: 400; color: var(--text-muted); }

  /* Calendar */
  .cal-wrap { display: flex; gap: 6px; align-items: flex-start; }
  .cal-body { flex: 1; }
  .day-hdrs { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 5px; }
  .dh { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 3px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }

  .dc {
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    position: relative;
    transition: opacity .15s;
  }
  .dc.empty { background: none; }
  .dc.no-act { border: 1.5px solid var(--border); color: var(--text-dim); }
  .dc.future { border: 1.5px solid #ebebeb; color: #ddd; }
  .dc.act {
    background: var(--text); color: white;
    cursor: pointer; font-size: 0;
  }
  .dc.act:hover { background: #333; }
  .dc.is-today { background: var(--orange) !important; color: white !important; }
  .act-ico { font-size: 13px; line-height: 1; }
  .multi {
    position: absolute; top: -1px; right: -1px;
    width: 13px; height: 13px; background: var(--orange);
    border-radius: 50%; font-size: 8px; font-weight: 700;
    color: white; display: flex; align-items: center; justify-content: center;
  }

  /* Streak col */
  .streak-col { display: flex; flex-direction: column; gap: 4px; padding-top: 28px; width: 30px; flex-shrink: 0; }
  .sw {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .sw.done { background: var(--orange-light); color: var(--orange); }
  .sw.fire { background: var(--orange); font-size: 16px; }
  .sw.nope { background: var(--empty); }

  /* Detail */
  .detail {
    display: none; margin-top: 14px;
    border-top: 1px solid var(--border); padding-top: 14px;
    animation: up .2s ease;
  }
  .detail.on { display: block; }
  @keyframes up { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .det-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .det-date { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-muted); }
  .det-x { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 0; line-height: 1; }
  .det-list { display: flex; flex-direction: column; gap: 10px; }
  .det-row { display: flex; align-items: center; gap: 10px; }
  .det-ico {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--text); display: flex; align-items: center;
    justify-content: center; font-size: 17px; flex-shrink: 0;
  }
  .det-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .det-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 10px; }

  /* Footer */
  .footer { text-align: center; margin-top: 14px; font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #ccc; text-transform: uppercase; }

  /* Loading */
  .ld { display: flex; align-items: center; justify-content: center; padding: 36px 0; gap: 10px; color: var(--text-muted); font-size: 13px; }
  .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: s .7s linear infinite; }
  @keyframes s { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo">STR<em>A</em>VA</div>
  <p class="auth-note">
    Incolla il tuo <strong style="color:#333">Access Token</strong> Strava.<br>
    Trovalo su <a href="https://www.strava.com/settings/api" target="_blank" style="color:var(--orange);font-weight:600;text-decoration:none">strava.com/settings/api</a>
  </p>
  <div class="token-row">
    <input type="password" id="tok" placeholder="Access Token…">
    <button class="btn-go" id="go">Entra</button>
  </div>
  <p class="err" id="err">Token non valido. Riprovare.</p>
</div>

<div id="app-screen">
  <div class="card">
    <div class="c-header">
      <div>
        <div class="month-row">
          <button class="nav-btn" id="prev">‹</button>
          <div class="month-label" id="mlabel">—</div>
          <button class="nav-btn" id="next">›</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="out" style="background:none;border:none;font-size:11px;color:#ccc;cursor:pointer;font-family:inherit">esci</button>
        <svg class="strava-chevron" viewBox="0 0 34 34" fill="none">
          <path d="M19 7 L26 20 H21 L26 30" stroke="#fc4c02" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 7 L12 20 H17 L12 30" stroke="#fc4c02" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="stats-row">
      <div>
        <div class="stat-lbl">La tua serie di attività</div>
        <div class="stat-val" id="s-streak">—<span class="stat-unit"> settimane</span></div>
      </div>
      <div>
        <div class="stat-lbl">Attività delle serie</div>
        <div class="stat-val" id="s-acts">—</div>
      </div>
    </div>

    <div class="ld" id="ld"><div class="spin"></div> Caricamento…</div>

    <div id="calsec" style="display:none">
      <div class="cal-wrap">
        <div class="cal-body">
          <div class="day-hdrs" id="dhdrs"></div>
          <div class="cal-grid" id="cgrid"></div>
        </div>
        <div class="streak-col" id="scol"></div>
      </div>
      <div class="detail" id="det">
        <div class="det-hdr">
          <span class="det-date" id="ddate"></span>
          <button class="det-x" id="dx">×</button>
        </div>
        <div class="det-list" id="dlist"></div>
      </div>
    </div>
  </div>
  <div class="footer">STRAVA</div>
</div>

<script>
const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MONTHS_S = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const DAYS = ['L','M','M','G','V','S','D'];
const EMOJIS = {Run:'🏃',VirtualRun:'🏃',Ride:'🚴',VirtualRide:'🚴',EBikeRide:'🚴',Swim:'🏊',Walk:'🚶',Hike:'🥾',WeightTraining:'🏋️',Workout:'💪',Yoga:'🧘'};
const emo = t => EMOJIS[t] || '🏅';

let year, month, acts = [];

const $ = id => document.getElementById(id);
const tok = () => localStorage.getItem('_sv');
const saveTok = t => localStorage.setItem('_sv', t);
const clear = () => { localStorage.removeItem('_sv'); localStorage.removeItem('_sva'); };

// Auth
$('go').onclick = doAuth;
$('tok').onkeydown = e => { if(e.key==='Enter') doAuth(); };

async function doAuth() {
  const v = $('tok').value.trim(); if(!v) return;
  $('go').textContent = '…';
  try {
    const r = await fetch('https://www.strava.com/api/v3/athlete', { headers:{Authorization:`Bearer ${v}`} });
    if(!r.ok) throw 0;
    saveTok(v);
    start();
  } catch { $('err').style.display='block'; $('go').textContent='Entra'; }
}

$('out').onclick = () => { clear(); location.reload(); };

window.onload = () => { if(tok()) start(); };

function start() {
  $('auth-screen').style.display = 'none';
  $('app-screen').style.display = 'block';
  const now = new Date(); year = now.getFullYear(); month = now.getMonth();
  $('prev').onclick = () => { month--; if(month<0){month=11;year--;} render(); };
  $('next').onclick = () => { month++; if(month>11){month=0;year++;} render(); };
  load();
}

async function load() {
  $('ld').style.display='flex'; $('calsec').style.display='none';
  const after = Math.floor(new Date(new Date().getFullYear()-2,0,1)/1000);
  try {
    let p=1, all=[];
    while(true) {
      const r = await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${after}&per_page=100&page=${p}`,{headers:{Authorization:`Bearer ${tok()}`}});
      if(!r.ok){clear();location.reload();return;}
      const d = await r.json();
      if(!d.length) break;
      all = all.concat(d);
      if(d.length<100) break;
      p++;
    }
    acts = all;
    render();
  } catch { $('ld').innerHTML='<span style="color:var(--orange)">Errore</span>'; }
}

function render() {
  $('ld').style.display='none'; $('calsec').style.display='block';
  $('det').classList.remove('on');
  $('mlabel').textContent = `${MONTHS[month]} ${year}`;

  const today = new Date();
  const mActs = acts.filter(a => { const d=new Date(a.start_date_local); return d.getFullYear()===year&&d.getMonth()===month; });
  const byDay = {};
  mActs.forEach(a => { const d=new Date(a.start_date_local).getDate(); (byDay[d]=byDay[d]||[]).push(a); });

  // Streak stats
  calcStreak();

  // Day headers
  $('dhdrs').innerHTML = DAYS.map(d=>`<div class="dh">${d}</div>`).join('');

  // Grid
  const grid = $('cgrid'); grid.innerHTML='';
  let off = new Date(year,month,1).getDay()-1; if(off<0) off=6;
  const dim = new Date(year,month+1,0).getDate();
  const rows = Math.ceil((off+dim)/7);

  for(let i=0;i<off;i++) { const e=document.createElement('div'); e.className='dc empty'; grid.appendChild(e); }

  for(let d=1;d<=dim;d++) {
    const el = document.createElement('div');
    const a = byDay[d]||[];
    const isTod = today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;
    const isFut = new Date(year,month,d)>today;

    if(isTod) {
      el.className = 'dc is-today';
      if(a.length) { el.innerHTML=`<span class="act-ico">${emo(a[0].sport_type||a[0].type)}</span>`; el.style.fontSize='0'; }
      else el.textContent=d;
    } else if(a.length) {
      el.className='dc act';
      el.innerHTML=`<span class="act-ico">${emo(a[0].sport_type||a[0].type)}</span>`;
      if(a.length>1) { const b=document.createElement('div'); b.className='multi'; b.textContent=a.length; el.appendChild(b); }
      el.onclick=()=>showDet(d,a);
    } else if(isFut) {
      el.className='dc future'; el.textContent=d;
    } else {
      el.className='dc no-act'; el.textContent=d;
    }
    grid.appendChild(el);
  }

  const rem = rows*7-off-dim;
  for(let i=0;i<rem;i++){const e=document.createElement('div');e.className='dc empty';grid.appendChild(e);}

  // Streak col
  const sc=$('scol'); sc.innerHTML='';
  for(let row=0;row<rows;row++){
    const s=row*7+1-off, e=(row+1)*7-off;
    let hasA=false;
    for(let c=s;c<=e;c++){if(c>=1&&c<=dim&&byDay[c]&&byDay[c].length){hasA=true;break;}}
    const todInRow=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()>=s&&today.getDate()<=e;
    const el=document.createElement('div'); el.className='sw';
    if(todInRow&&hasA){el.classList.add('fire');el.innerHTML='🔥';}
    else if(hasA){el.classList.add('done');el.innerHTML='✓';}
    else{el.classList.add('nope');}
    sc.appendChild(el);
  }
}

function calcStreak(){
  const getMonday=d=>{const day=d.getDay(),diff=day===0?-6:1-day,m=new Date(d);m.setDate(d.getDate()+diff);m.setHours(0,0,0,0);return m;};
  let streak=0,total=0,ws=getMonday(new Date());
  for(let w=0;w<104;w++){
    const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
    const wa=acts.filter(a=>{const d=new Date(a.start_date_local);return d>=ws&&d<=we;});
    if(wa.length){streak++;total+=wa.length;ws.setDate(ws.getDate()-7);}
    else if(w===0){ws.setDate(ws.getDate()-7);}
    else break;
  }
  $('s-streak').innerHTML=`${streak}<span class="stat-unit"> settimane</span>`;
  $('s-acts').textContent=total;
}

function showDet(day, a){
  $('ddate').textContent=`${day} ${MONTHS_S[month]} ${year}`;
  const list=$('dlist'); list.innerHTML='';
  a.forEach(x=>{
    const dist=x.distance?`${(x.distance/1000).toFixed(2)} km`:null;
    const time=x.moving_time?fmtT(x.moving_time):null;
    const pace=(x.sport_type==='Run'||x.type==='Run')&&x.distance&&x.moving_time?fmtP(x.moving_time/(x.distance/1000))+'/km':null;
    const elev=x.total_elevation_gain?`↑${Math.round(x.total_elevation_gain)}m`:null;
    const metas=[dist,time,pace||elev].filter(Boolean);
    const row=document.createElement('div'); row.className='det-row';
    row.innerHTML=`<div class="det-ico">${emo(x.sport_type||x.type)}</div>
      <div style="flex:1;min-width:0">
        <div class="det-name">${x.name}</div>
        <div class="det-meta">${metas.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>`;
    list.appendChild(row);
  });
  $('det').classList.add('on');
}

$('dx').onclick=()=>$('det').classList.remove('on');

function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;}
function fmtP(spk){const m=Math.floor(spk/60),s=Math.round(spk%60);return `${m}:${String(s).padStart(2,'0')}`;}
</script>
</body>
</html>
